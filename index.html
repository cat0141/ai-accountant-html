<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单导入 - AI 会计师</title>
  <link rel="stylesheet" href="css/ai-accountant.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <div class="header">
    <div class="header-nav">
      <button class="header-btn">☰</button>
      <div class="header-title">订单导入</div>
      <button class="header-btn">⟳</button>
    </div>
  </div>
  
  <!-- AI 小云卡片 -->
  <div class="ai-cloud-card">
    <div class="ai-avatar">👸</div>
    <div class="ai-content">
      <div class="ai-name">小云 AI</div>
      <div class="ai-message">
        Hi~ 上传订单文件，自动解析生成收入~
        <br>支持淘宝、京东、拼多多等平台订单
      </div>
    </div>
  </div>
  
  <!-- 上传区域 -->
  <div class="upload-area">
    <div class="upload-icon">📤</div>
    <div class="upload-title">点击上传订单文件</div>
    <div class="upload-desc">支持淘宝/京东/拼多多订单报表</div>
    <button class="upload-btn" onclick="uploadFile()">选择文件</button>
    <div class="upload-hint">
      支持格式：.xlsx / .csv<br>
      文件大小：最大 10MB
    </div>
  </div>
  
  <!-- 导入记录预览 -->
  <div class="stats-card">
    <div class="stats-header">
      <span class="stats-icon">📋</span>
      <span class="stats-title">最近导入记录</span>
    </div>
    
    <div class="list-card">
      <div class="list-info">
        <div class="list-title">宝贝报表 20260310.xlsx</div>
        <div class="list-desc">2026-03-11 19:10 · 156 单</div>
      </div>
      <div class="list-status list-status-success">✅ 成功</div>
    </div>
    
    <div class="list-card">
      <div class="list-info">
        <div class="list-title">订单报表 20260228.xlsx</div>
        <div class="list-desc">2026-02-28 14:30 · 89 单</div>
      </div>
      <div class="list-status list-status-success">✅ 成功</div>
    </div>
    
    <div class="list-card">
      <div class="list-info">
        <div class="list-title">订单 20260215.csv</div>
        <div class="list-desc">2026-02-15 09:15 · 45 单</div>
      </div>
      <div class="list-status list-status-error">❌ 失败</div>
    </div>
  </div>
  
  <!-- 底部固定操作栏 -->
  <div class="bottom-bar">
    <button class="action-btn action-btn-secondary" onclick="viewRecords()">导入记录</button>
    <button class="action-btn action-btn-secondary" onclick="viewHelp()">帮助说明</button>
  </div>
  
  <script>
    function uploadFile() {
      alert('打开文件选择器...');
      // 实际实现：触发文件选择
      // document.getElementById('fileInput').click();
    }
    
    function viewRecords() {
      window.location.href = 'import-records.html';
    }
    
    function viewHelp() {
      alert('帮助说明：\n\n1. 从电商平台导出订单报表\n2. 点击"选择文件"上传\n3. 系统自动解析订单数据\n4. 确认数据后生成收入');
    }
  </script>
</body>
</html>
